---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflux
  namespace: miniflux
spec:
  selector:
    matchLabels:
      app: miniflux
  replicas: 1
  template:
    metadata:
      labels:
        app: miniflux
    spec:
      containers:
        - name: miniflux
          image: miniflux/miniflux:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: RUN_MIGRATIONS
              value: "1"
            - name: CREATE_ADMIN
              value: "1"
            - name: ADMIN_USERNAME
              value: "admin"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: miniflux
                  key: miniflux-admin-password
            - name: OAUTH2_PROVIDER
              value: "oidc"
            - name: OAUTH2_USER_CREATION
              value: "1"
            - name: OAUTH2_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: miniflux
                  key: miniflux-oauth2-client-id
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: miniflux
                  key: miniflux-oauth2-client-secret
            - name: OAUTH2_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: miniflux
                  key: miniflux-oauth2-redirect-url
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: miniflux-postgres-app
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: miniflux-postgres-app
                  key: uri
            # - name: DATABASE_URL
            #   value: "postgres://miniflux:p:$(POSTGRES_PASSWORD)@miniflux-postgres-rw.miniflux.svc.cluster.local/miniflux2?sslmode=disable"

---
apiVersion: v1
kind: Service
metadata:
  name: miniflux
  namespace: miniflux
  labels:
    app: miniflux
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: miniflux
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: miniflux
spec:
  rules:
    - host: "miniflux.wcfm.me"
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: miniflux
                port:
                  number: 80

  # tls:
  # - hosts:
  #   - "miniflux.wcfm.me"
  #   secretName: miniflux-tls
