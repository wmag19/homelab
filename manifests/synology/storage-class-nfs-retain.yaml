apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: synology-nfs-retain
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: csi.san.synology.com
parameters:
  protocol: "nfs"
  dsm: "192.168.1.136"
  location: "/volume1"
  mountPermissions: "0750"
mountOptions:
  - nfsvers=4.0
reclaimPolicy: Retain
allowVolumeExpansion: true
