apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: grafana-postgres
  namespace: monitoring
spec:
  instances: 1
  bootstrap:
    initdb:
      database: grafana
      owner: grafana
      # secret:
      #   name: miniflux-postgres-secret

  storage:
    size: 10Gi
    storageClass: synology-iscsi-retain
