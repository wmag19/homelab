# omnictl cluster template sync -v -f cluster-template-working.yaml
---
kind: Cluster
name: homelab-cluster
labels:
  cluster-id: "1"
kubernetes:
  version: v1.35.2
talos:
  version: v1.12.5
patches:
  - name: allow-scheduling-control-plane
    inline:
      cluster:
        allowSchedulingOnControlPlanes: true
  - name: disable-default-cni
    inline:
      cluster:
        network:
          podSubnets:
          - 10.244.0.0/16    # Still define your pod CIDR
          serviceSubnets:
          - 10.96.0.0/12     # And service CIDR
        #   cni:
        #     name: none
        # proxy:
        #   disabled: true

          
---
kind: ControlPlane
machineClass:
  name: proxmox-control-plane
  size: 3
systemExtensions:
  - siderolabs/qemu-guest-agent
  - siderolabs/util-linux-tools
  - siderolabs/iscsi-tools
  - siderolabs/nfsd