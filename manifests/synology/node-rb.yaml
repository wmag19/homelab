apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: node-secret-reader
  namespace: synology
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: node-secret-reader-binding
  namespace: synology
subjects:
  - kind: Group
    name: system:nodes
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: node-secret-reader
  apiGroup: rbac.authorization.k8s.io
