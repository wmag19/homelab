machine:
  kubelet:
    extraArgs:
      rotate-server-certificates: true
  network:
    nameservers:
      - 192.168.1.1
    interfaces:
      - interface: ens18
        dhcp: false
        addresses:
          - 192.168.1.61/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.254
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: talos-worker-01
auto: off
---
apiVersion: v1alpha1
kind: ResolverConfig
nameservers:
    - address: 192.168.1.1
