kind: ListenerSet
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  parentRef:
    name: gateway-envoy
    namespace: envoy-gateway
  listeners:
    - name: https
      hostname: grafana.wcfm.me
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: grafana-tls
            kind: Secret

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: miniflux
spec:
  parentRefs:
    - kind: ListenerSet
      name: miniflux
      namespace: miniflux
  hostnames:
    - "grafana.wcfm.me"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: k8s-stack-grafana
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
