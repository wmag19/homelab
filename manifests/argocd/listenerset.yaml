kind: ListenerSet
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: argocd
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  parentRef:
    name: gateway-envoy
    namespace: envoy-gateway
  listeners:
    - name: https
      hostname: argocd.wcfm.me
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: argocd-tls
            kind: Secret
    - name: http
      hostname: argocd.wcfm.me
      port: 80
      protocol: HTTP
