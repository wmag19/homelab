apiVersion: v1
kind: PersistentVolume
metadata:
  finalizers:
  - kubernetes.io/pv-protection
  name: pv-navidrome-music
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 10Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: pvc-navidrome-music
    namespace: navidrome
  csi:
    driver: csi.san.synology.com
    volumeAttributes:
      baseDir: /volume1/navidrome-music
      dsm: 192.168.1.136
      formatOptions: ""
      mountPermissions: "0770"
      protocol: smb
      source: //192.168.1.136/navidrome-music
  mountOptions:
  - nfsvers=4.0
  persistentVolumeReclaimPolicy: Retain
  storageClassName: synology-nfs-retain
  volumeMode: Filesystem
