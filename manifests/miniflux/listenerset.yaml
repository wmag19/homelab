kind: ListenerSet
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: miniflux
  namespace: miniflux
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
spec:
  parentRef:
    name: gateway-envoy
    namespace: envoy-gateway
  listeners:
    - name: https
      hostname: miniflux.wcfm.me
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: miniflux-tls
            kind: Secret
    - name: http
      hostname: miniflux.wcfm.me
      port: 80
      protocol: HTTP
