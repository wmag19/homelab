kind: ListenerSet
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: homepage
  namespace: homepage
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  parentRef:
    name: gateway-envoy
    namespace: envoy-gateway
  listeners:
    - name: https
      hostname: homepage.wcfm.me
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: homepage-tls
            kind: Secret
