apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-envoy
  namespace: envoy-gateway
spec:
  gatewayClassName: envoy
  allowedListeners:
    namespaces:
      from: All
  listeners:
    - name: http
      hostname: dummy
      protocol: HTTP
      port: 1234
