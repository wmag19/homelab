machine:
  kubelet:
    extraArgs:
      rotate-server-certificates: true
  network:
    interfaces:
      - interface: eth0
        dhcp: false
        addresses:
          - 192.168.1.51/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.254
        vip:
          ip: 192.168.1.9
